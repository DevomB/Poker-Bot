# Shared steps: setup Node, optionally regenerate lockfile + commit/push, then verify-lock.
# Callers must run actions/checkout first (with token if pushing).
name: Sync package lock
description: >
  Regenerates package-lock.json from package.json (optional). Commits and pushes when
  the lockfile changed, then runs npm run verify-lock with CI=true.

inputs:
  node-version:
    description: Node.js version for npm
    required: false
    default: '22'
  regenerate-and-push:
    description: >
      When true, run npm install --package-lock-only and push if package-lock.json changed.
      When false, only verify (use on PRs).
    required: false
    default: 'true'
  commit-author-name:
    description: Git author name for the lockfile commit (when a commit is created)
    required: false
    default: 'DBs-Server-Service'
  commit-author-email:
    description: Git author email for the lockfile commit
    required: false
    default: 'Devom.b@yahoo.com'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Regenerate lockfile and push if changed
      if: ${{ inputs.regenerate-and-push == 'true' }}
      shell: bash
      env:
        COMMIT_AUTHOR_NAME: ${{ inputs.commit-author-name }}
        COMMIT_AUTHOR_EMAIL: ${{ inputs.commit-author-email }}
      run: bash "$GITHUB_WORKSPACE/scripts/sync-package-lock.sh"

    - name: Verify package-lock.json matches package.json
      shell: bash
      run: npm run verify-lock
      env:
        CI: true
