# npm publish when package.json version is not yet on the registry (native prebuilds matrix).
#
# Triggers: workflow_dispatch, or workflow_run after "Sync package lockfile" succeeds on main.
# On workflow_dispatch only, release-gate runs the shared lock action first (main already
# has a fresh lock after a successful Sync workflow_run).
#
# Secrets: NPM_TOKEN — npm automation/granular token with publish for this package.

name: Native prebuilds & npm publish

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync package lockfile
    types:
      - completed

env:
  NODE_VERSION: '22'

concurrency:
  group: npm-publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/sync-package-lock
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-node@v5
        if: ${{ github.event_name == 'workflow_run' }}
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: gate
        run: node scripts/should-npm-publish.js

  build:
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tuple: win32-x64
          - os: ubuntu-latest
            tuple: linux-x64
          - os: macos-latest
            tuple: darwin-arm64
          # Intel macOS: avoid macos-13 (deprecated); use dedicated Intel image.
          - os: macos-15-intel
            tuple: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile
        shell: bash

      - name: Stage prebuild (node.napi.node)
        run: node scripts/stage-prebuild.js ${{ matrix.tuple }}
        shell: bash

      - name: Flatten artifact name for merge job
        run: cp "prebuilds/${{ matrix.tuple }}/node.napi.node" "${{ matrix.tuple }}.napi.node"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.tuple }}
          path: ${{ matrix.tuple }}.napi.node

  publish:
    name: Publish to npm
    needs: [release-gate, build]
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: _native_bins
          merge-multiple: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Assemble prebuilds/
        run: node scripts/assemble-prebuilds.js _native_bins

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
