# npm publish when package.json version is not yet on the registry (native prebuilds matrix).
#
# Trigger: workflow_dispatch only (deliberate release). Bump package.json on main, let
# "Sync package lockfile" finish if it runs, then run this workflow from the Actions tab.
# This avoids burning semver numbers when the native matrix fails before publish.
#
# Secrets: NPM_TOKEN — npm automation/granular token with publish for this package.

name: Native prebuilds & npm publish

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22'

concurrency:
  group: npm-publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/sync-package-lock
        with:
          node-version: ${{ env.NODE_VERSION }}

      - id: gate
        run: node scripts/should-npm-publish.js

  build:
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tuple: win32-x64
          - os: windows-11-arm
            tuple: win32-arm64
          - os: ubuntu-latest
            tuple: linux-x64
          - os: ubuntu-24.04-arm
            tuple: linux-arm64
          - os: macos-latest
            tuple: darwin-arm64
          # Intel macOS: avoid macos-13 (deprecated); use dedicated Intel image.
          - os: macos-15-intel
            tuple: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile
        shell: bash

      - name: Stage prebuild (node.napi.node)
        run: node scripts/stage-prebuild.js ${{ matrix.tuple }}
        shell: bash

      - name: Flatten artifact name for merge job
        run: cp "prebuilds/${{ matrix.tuple }}/node.napi.node" "${{ matrix.tuple }}.napi.node"
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.tuple }}
          path: ${{ matrix.tuple }}.napi.node

  # GitHub: JS Actions inside Alpine containers only work on x64 Linux hosts — not on ubuntu-*-arm.
  # linux-x64 musl: native Alpine job on ubuntu-latest.
  # linux-arm64 musl: build on ubuntu-latest via Docker (--platform linux/arm64) + QEMU.
  build-musl-x64:
    name: Build (Alpine / musl, linux-x64)
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Install Alpine build dependencies
        run: apk add --no-cache python3 make g++ cmake git bash

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile

      - name: Stage prebuild (node.napi.musl.node)
        run: node scripts/stage-prebuild.js linux-x64 musl

      - name: Flatten artifact name for merge job
        run: cp prebuilds/linux-x64/node.napi.musl.node linux-x64-musl.napi.node

      - uses: actions/upload-artifact@v7
        with:
          name: native-linux-x64-musl
          path: linux-x64-musl.napi.node

  build-musl-arm64:
    name: Build (Alpine / musl, linux-arm64)
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - name: Build in arm64 Alpine (Docker)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/ws" -w /ws \
            node:22-alpine \
            sh -exc '
              apk add --no-cache python3 make g++ cmake git bash
              npm ci
              node scripts/build-native.js compile
              node scripts/stage-prebuild.js linux-arm64 musl
            '
          cp prebuilds/linux-arm64/node.napi.musl.node linux-arm64-musl.napi.node

      - uses: actions/upload-artifact@v7
        with:
          name: native-linux-arm64-musl
          path: linux-arm64-musl.napi.node

  publish:
    name: Publish to npm
    needs: [release-gate, build, build-musl-x64, build-musl-arm64]
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: _native_bins
          merge-multiple: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Assemble prebuilds/
        run: node scripts/assemble-prebuilds.js _native_bins

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
