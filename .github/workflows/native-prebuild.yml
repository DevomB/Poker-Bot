# Build native addons per OS and publish to npm when package.json "version" is new on the registry.
#
# Trigger: push to main that changes package.json (e.g. version bump), or workflow_dispatch.
# No git tags required — CI skips build/publish if that exact version already exists on npm.
#
# Lockfile: npm ci needs package-lock.json to match package.json. On a push that only changed
# package.json, sync-package-lock.yml may fix the lock in a follow-up commit; this job still runs
# on the first push, so we refresh the lock on the runner before npm ci (same as npm run sync-lock).
# Commit package-lock.json when you change deps so local and CI stay aligned.
#
# Secrets (repository → Settings → Secrets and variables → Actions):
#   NPM_TOKEN — npm "Automation" or "Granular Access Token" with publish permission for this package.

name: Native prebuilds & npm publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'

concurrency:
  group: npm-publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-gate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - id: gate
        run: node scripts/should-npm-publish.js

  build:
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tuple: win32-x64
          - os: ubuntu-latest
            tuple: linux-x64
          - os: macos-latest
            tuple: darwin-arm64
          # Intel (x64) macOS: avoid macos-13 — deprecated, tiny pool, multi-hour queues / brownouts.
          # Use the dedicated Intel image: https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/
          - os: macos-15-intel
            tuple: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Align package-lock.json with package.json
        run: npm install --package-lock-only

      - name: Install dependencies
        run: npm ci

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile
        shell: bash

      - name: Stage prebuild (node.napi.node)
        run: node scripts/stage-prebuild.js ${{ matrix.tuple }}
        shell: bash

      - name: Flatten artifact name for merge job
        run: cp "prebuilds/${{ matrix.tuple }}/node.napi.node" "${{ matrix.tuple }}.napi.node"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.tuple }}
          path: ${{ matrix.tuple }}.napi.node

  publish:
    name: Publish to npm
    needs: [release-gate, build]
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: _native_bins
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Assemble prebuilds/
        run: node scripts/assemble-prebuilds.js _native_bins

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
