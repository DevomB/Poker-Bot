# Runs when package.json / package-lock.json change on main (typical release merge), and on
# workflow_dispatch to re-run after a failure without a new commit. The release gate skips the
# native matrix + publish when that version is already on npm (scripts/should-npm-publish.js).
#
# Auth: npm Trusted Publishing (OIDC). Configure at npmjs.com for this repo + workflow file
# npm-publish.yml — no NPM_TOKEN. Requires Node ≥22.14 and npm CLI ≥11.5.1 on the publish job.

name: npm publish

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  workflow_dispatch:

env:
  NODE_VERSION: '22.14'

concurrency:
  group: npm-publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (validate lockfile)
        run: npm ci

      - id: gate
        run: node scripts/should-npm-publish.js

  build:
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            tuple: win32-x64
          - os: windows-11-arm
            tuple: win32-arm64
          - os: ubuntu-latest
            tuple: linux-x64
          - os: ubuntu-24.04-arm
            tuple: linux-arm64
          - os: macos-latest
            tuple: darwin-arm64
          - os: macos-15-intel
            tuple: darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile
        shell: bash

      - name: Stage prebuild (node.napi.node)
        run: node scripts/stage-prebuild.js ${{ matrix.tuple }}
        shell: bash

      - name: Flatten artifact name for merge job
        run: cp "prebuilds/${{ matrix.tuple }}/node.napi.node" "${{ matrix.tuple }}.napi.node"
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.tuple }}
          path: ${{ matrix.tuple }}.napi.node

  build-musl-x64:
    name: Build (Alpine / musl, linux-x64)
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    container:
      image: node:22.14-alpine
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Alpine build dependencies
        run: apk add --no-cache python3 make g++ cmake git bash

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile native addon (cmake-js)
        run: node scripts/build-native.js compile

      - name: Stage prebuild (node.napi.musl.node)
        run: node scripts/stage-prebuild.js linux-x64 musl

      - name: Flatten artifact name for merge job
        run: cp prebuilds/linux-x64/node.napi.musl.node linux-x64-musl.napi.node

      - uses: actions/upload-artifact@v7
        with:
          name: native-linux-x64-musl
          path: linux-x64-musl.napi.node

  build-musl-arm64:
    name: Build (Alpine / musl, linux-arm64)
    needs: release-gate
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - name: Build in arm64 Alpine (Docker)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/ws" -w /ws \
            node:22.14-alpine \
            sh -exc '
              apk add --no-cache python3 make g++ cmake git bash
              npm ci
              node scripts/build-native.js compile
              node scripts/stage-prebuild.js linux-arm64 musl
            '
          cp prebuilds/linux-arm64/node.napi.musl.node linux-arm64-musl.napi.node

      - uses: actions/upload-artifact@v7
        with:
          name: native-linux-arm64-musl
          path: linux-arm64-musl.napi.node

  publish:
    name: Publish to npm
    needs: [release-gate, build, build-musl-x64, build-musl-arm64]
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: _native_bins
          merge-multiple: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Assemble prebuilds/
        run: node scripts/assemble-prebuilds.js _native_bins

      - name: Ensure npm CLI for OIDC (≥11.5.1)
        run: npm install -g npm@^11.5.1

      - name: Publish to npm (trusted publishing / OIDC)
        run: npm publish --access public
