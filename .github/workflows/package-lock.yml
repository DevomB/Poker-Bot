# Fail fast when package.json was edited without updating package-lock.json (PRs).
# On main, sync-package-lock.yml updates the lock and runs npm run verify-lock after push.
name: Package lockfile

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Verify package-lock.json matches package.json
        run: npm run verify-lock
