# Fail PRs when package-lock.json does not match package.json (no auto-regeneration in CI).

name: Package lockfile

env:
  NODE_VERSION: '22'

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install (strict lockfile)
        run: npm ci

      - name: Verify lockfile matches package.json
        run: npm run verify-lock
        env:
          CI: true
