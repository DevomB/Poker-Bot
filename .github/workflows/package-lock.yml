# Fail fast when package.json was edited without updating package-lock.json.
name: Package lockfile

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify package-lock.json matches package.json
        run: npm run verify-lock
