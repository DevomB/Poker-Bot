# Fail PRs when package.json / package-lock.json drift; contributors must run npm run sync-lock.
# On push to main, "Sync package lockfile" uses the same action with regenerate-and-push enabled.
name: Package lockfile

env:
  NODE_VERSION: '22'

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/sync-package-lock
        with:
          node-version: ${{ env.NODE_VERSION }}
          regenerate-and-push: 'false'
