# Regenerates package-lock.json when package.json changes, then verify-lock.
# Does not run on lock-only commits (path filter), so it does not loop with its own push.
# Downstream: Native prebuild triggers via workflow_run after this workflow completes.
#
# Fork contributors: run npm run sync-lock locally and push — this workflow only runs on pushes to this repo.
name: Sync package lockfile

on:
  push:
    paths:
      - package.json
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: write

concurrency:
  group: sync-package-lock-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: ./.github/actions/sync-package-lock
        with:
          node-version: ${{ env.NODE_VERSION }}
