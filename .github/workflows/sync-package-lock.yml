# Regenerates package-lock.json from package.json and pushes if it changed.
# Triggers on pushes that touch package.json only (not lock-only commits), so this
# does not loop. Follow-up workflows (e.g. native prebuild) should use workflow_run
# after this workflow so they see the lockfile commit on the branch.
# Fork PRs: pushes land on the fork; this workflow runs on your repo's pushes only—
# contributors from forks should run: npm run sync-lock and push.
name: Sync package lockfile

on:
  push:
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-package-lock-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Regenerate lockfile and push if changed
        run: |
          npm install --package-lock-only
          git add package-lock.json
          if git diff --staged --quiet; then
            echo "package-lock.json already matches package.json"
            exit 0
          fi
          git config user.name "DBs-Server-Service"
          git config user.email "Devom.hb@gmail.com"
          git commit -m "chore: sync package-lock.json"
          git push

      - name: Verify committed lockfile matches package.json
        run: npm run verify-lock
